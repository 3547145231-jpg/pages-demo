<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript基础知识练习</title>
</head>
<body>
    <h1>JavaScript基础知识练习</h1>
    <script>
        // 变量的定义
        var name = "Alice";
        let age = 38;
        const PI = 3.14;
        // 打印变量
        console.log("Name:", name);
        console.log("Age:", age);
        console.log("PI:", PI);
        // 变量的类型
        console.log("Type of Name:", typeof name);
        console.log("Type of Age:", typeof age);
        console.log("Type of PI:", typeof PI);
        // javaScript中的数据类型
        let isStudent = true; // boolean
        // let score = null; //null
        let undefinedYar; // underfined
        // 运算符与表达式（加上注释，请全面补全）
        let a = 10;
        let b = 5;
        // 算术运算符
        console.log("a + b =", a + b); // 加法
        console.log("a - b =", a - b); // 减法
        console.log("a * b =", a * b); // 乘法
        console.log("a / b =", a / b); // 除法
        console.log("a % b =", a % b); // 取模
        // 赋值运算符
        a += b; // 等同于 a = a + b
        console.log("After a += b, a =", a);
        a -= b; // 等同于 a = a - b
        console.log("After a -= b, a =", a);
        a *= b; // 等同于 a = a * b
        console.log("After a *= b, a =", a);
        a /= b; // 等同于 a = a / b
        console.log("After a /= b, a =", a);
        // 逻辑运算符
        let x = true;
        let y = false;
        console.log("x && y =", x && y); // 逻辑与
        console.log("x || y =", x || y); // 逻辑或
        console.log("!x =", !x); // 逻辑非
        console.log("!y =", !y); // 逻辑非
        // 比较运算符
        console.log("a == b =", a == b); // 等于
        console.log("a === b =", a === b); // 全等于
        console.log("a != b =", a != b); // 不等于
        console.log("a !== b =", a !== b); // 不全等于
        console.log("a > b =", a > b); // 大于
        console.log("a < b =", a < b); // 小于
        console.log("a >= b =", a >= b); // 大于等于
        console.log("a <= b =", a <= b); // 小于等于
        // 流程控制
        let score = 85;
        if (score >= 90) {
            console.log("Grade: A");
        } else if (score >= 80) {
            console.log("Grade: B");
        } else if (score >= 70) {
            console.log("Grade: C");
        } else if (score >= 60) {
            console.log("Grade: D");
        } else {
            console.log("Grade: F");
        }   
        // 循环控制
        for (let i = 0; i < 5; i++) {
            console.log("For loop iteration:", i);
        }
        let j = 0;
        while (j < 5) {
            console.log("While loop iteration:", j);
            j++;
        }
        // 函数定义与调用
        function greet(name) {
            return "Hello, " + name + "!";
        }
        console.log(greet("Alice"));
    </script>
</body>
</html>
