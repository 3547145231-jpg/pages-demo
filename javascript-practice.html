<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 基础知识练习</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; padding: 20px; }
        h1, h2 { color: #2c3e50; }
        pre { background: #f5f5f5; padding: 12px; border-radius: 5px; }
        .output { background: #272822; color: #f8f8f2; padding: 12px; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>JavaScript 基础知识练习</h1>
    <p>本页面演示变量、类型、表达式、流程控制和函数的基本用法。</p>

    <h2>练习结果</h2>
    <div id="result" class="output"></div>

    <script>
        function appendLine(text) {
            const result = document.getElementById('result');
            result.textContent += text + '\n';
        }

        // 1. 变量的定义
        const name = 'Alice';
        let age = 18;
        var score = 92;
        const isStudent = true;
        let unknownValue;

        appendLine('1. 变量的定义:');
        appendLine(`name = ${name}`);
        appendLine(`age = ${age}`);
        appendLine(`score = ${score}`);
        appendLine(`isStudent = ${isStudent}`);
        appendLine(`unknownValue = ${unknownValue}`);
        appendLine('');

        // 2. 变量类型
        appendLine('2. 变量类型:');
        appendLine(`typeof name = ${typeof name}`);
        appendLine(`typeof age = ${typeof age}`);
        appendLine(`typeof score = ${typeof score}`);
        appendLine(`typeof isStudent = ${typeof isStudent}`);
        appendLine(`typeof unknownValue = ${typeof unknownValue}`);
        appendLine('');

        // 3. 表达式
        const total = score + 8;
        const average = (score + 88) / 2;
        const message = 'Hello, ' + name + '!';
        appendLine('3. 表达式:');
        appendLine(`total = score + 8 = ${total}`);
        appendLine(`average = (score + 88) / 2 = ${average}`);
        appendLine(`message = ${message}`);
        appendLine('');

        // 4. 流程控制
        appendLine('4. 流程控制:');
        if (age >= 18) {
            appendLine('age >= 18: 你已经成年。');
        } else {
            appendLine('age < 18: 你还未成年。');
        }

        appendLine('使用 for 循环打印 1-3:');
        for (let i = 1; i <= 3; i++) {
            appendLine(`  循环第 ${i} 次`);
        }
        appendLine('');

        // 5. 函数
        function calculateBonus(scoreValue) {
            if (scoreValue >= 90) {
                return 10;
            }
            return 5;
        }

        function sayHello(userName) {
            return `你好，${userName}！欢迎学习 JavaScript。`;
        }

        const bonus = calculateBonus(score);
        appendLine('5. 函数:');
        appendLine(`calculateBonus(${score}) = ${bonus}`);
        appendLine(sayHello(name));
    </script>
</body>
</html>
